<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex" />
  <title>증여세 엔진 골든 테스트</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 960px; margin: 24px auto; padding: 0 16px; }
    h1 { font-size: 20px; }
    table { border-collapse: collapse; width: 100%; font-size: 14px; }
    th, td { border: 1px solid #ddd; padding: 6px 8px; text-align: right; }
    th:first-child, td:first-child { text-align: left; }
    .pass { color: #0a7d28; font-weight: 700; }
    .fail { color: #c01818; font-weight: 700; }
    #summary { font-size: 18px; margin: 12px 0; }
    .note { color: #666; font-size: 13px; }
  </style>
</head>
<body>
  <h1>증여세 계산 엔진 — 골든 테스트</h1>
  <p class="note">
    ⚠️ 이 테스트는 <b>엔진이 정의된 규칙대로 일관되게 계산하는지</b>를 잠근다.
    기대값은 상증법 제53·53조의2·56·57·69조(국세청 세율표 대조)로 수계산함.
  </p>
  <div id="summary">실행 중…</div>
  <table id="results">
    <thead>
      <tr><th>시나리오</th><th>항목</th><th>기대</th><th>실제</th><th>판정</th></tr>
    </thead>
    <tbody></tbody>
  </table>

  <script src="js/rules-jeungyeo-2026.js"></script>
  <script src="js/jeungyeo-tax.js"></script>
  <script>
    var cases = [
      // 산출세액 = 과표×세율−누진공제 / 신고세액공제 3% / 세대생략 할증 30%(미성년+20억↑ 40%)
      { name: 'A. 성년 자녀 1.5억 (교과서 케이스: 공제5천 → 과표1억 → 10%)',
        input: { amount: 150000000, relation: 'adult' },
        expect: { totalValue: 150000000, deduction: 50000000, taxBase: 100000000, calcTax: 10000000, reportCredit: 300000, finalTax: 9700000 } },

      { name: 'B. 성년 자녀 3억 + 혼인공제 1억 (공제 1.5억 → 과표 1.5억 → 20%−1천만)',
        input: { amount: 300000000, relation: 'adult', useMarriageBirth: true },
        expect: { deduction: 150000000, taxBase: 150000000, calcTax: 20000000, reportCredit: 600000, finalTax: 19400000 } },

      { name: 'C. 배우자 8억 (공제 6억 → 과표 2억)',
        input: { amount: 800000000, relation: 'spouse' },
        expect: { deduction: 600000000, taxBase: 200000000, calcTax: 30000000, reportCredit: 900000, finalTax: 29100000 } },

      { name: 'D. 미성년 손주 1억 · 세대생략 (공제2천 → 과표8천 → 할증 30%)',
        input: { amount: 100000000, relation: 'minor', isSkip: true },
        expect: { deduction: 20000000, taxBase: 80000000, calcTax: 8000000, surcharge: 2400000, reportCredit: 312000, finalTax: 10088000 } },

      { name: 'E. 형제(기타친족) 5천만 (공제 1천만)',
        input: { amount: 50000000, relation: 'relative' },
        expect: { deduction: 10000000, taxBase: 40000000, calcTax: 4000000, reportCredit: 120000, finalTax: 3880000 } },

      { name: 'F. 타인 1억 (공제 0)',
        input: { amount: 100000000, relation: 'other' },
        expect: { deduction: 0, taxBase: 100000000, calcTax: 10000000, reportCredit: 300000, finalTax: 9700000 } },

      { name: 'G. 성년 자녀 2억 + 10년 내 사전증여 1억 (합산 3억 → 기납부 500만 차감)',
        input: { amount: 200000000, relation: 'adult', prior: 100000000 },
        expect: { totalValue: 300000000, deduction: 50000000, taxBase: 250000000, calcTax: 40000000, priorCredit: 5000000, reportCredit: 1050000, finalTax: 33950000 } },

      { name: 'H. 성년 자녀 15억 (과표 14.5억 → 40%−1.6억)',
        input: { amount: 1500000000, relation: 'adult' },
        expect: { taxBase: 1450000000, calcTax: 420000000, reportCredit: 12600000, finalTax: 407400000 } },

      { name: 'I. 미성년 손주 25억 · 세대생략 (20억 초과 → 할증 40%)',
        input: { amount: 2500000000, relation: 'minor', isSkip: true },
        expect: { taxBase: 2480000000, calcTax: 832000000, surcharge: 332800000, reportCredit: 34944000, finalTax: 1129856000 } },

      { name: 'J. 성년 자녀 4천만 (공제 한도 내 → 세액 0)',
        input: { amount: 40000000, relation: 'adult' },
        expect: { deduction: 40000000, taxBase: 0, calcTax: 0, finalTax: 0 } },

      { name: 'K. 성년 자녀 1.5억 · 기한 후 신고 (신고세액공제 없음)',
        input: { amount: 150000000, relation: 'adult', onTimeReport: false },
        expect: { calcTax: 10000000, reportCredit: 0, finalTax: 10000000 } },
    ];

    var tbody = document.querySelector('#results tbody');
    var pass = 0, fail = 0;

    cases.forEach(function (c) {
      var r = window.Jeungyeo.calcJeungyeoTax(c.input);
      var fields = Object.keys(c.expect);
      fields.forEach(function (f, i) {
        var exp = c.expect[f];
        var act = r.ok ? r[f] : 'ERR';
        var ok = act === exp;
        ok ? pass++ : fail++;
        var tr = document.createElement('tr');
        tr.innerHTML =
          '<td>' + (i === 0 ? c.name : '') + '</td>' +
          '<td>' + f + '</td>' +
          '<td>' + exp.toLocaleString() + '</td>' +
          '<td>' + (typeof act === 'number' ? act.toLocaleString() : act) + '</td>' +
          '<td class="' + (ok ? 'pass' : 'fail') + '">' + (ok ? 'PASS' : 'FAIL') + '</td>';
        tbody.appendChild(tr);
      });
    });

    var s = document.getElementById('summary');
    s.textContent = '결과: ' + pass + ' PASS / ' + fail + ' FAIL';
    s.className = fail === 0 ? 'pass' : 'fail';
  </script>
</body>
</html>
